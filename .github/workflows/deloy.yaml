name: Deploy DORO Service

on:
  push:
    branches:
      - main # main 브랜치에 push가 발생하면 작동합니다.

env:
  AWS_REGION: ap-northeast-2              # 서울 리전 코드 (두 job 공통)

jobs:
  # 0. 어떤 폴더가 바뀌었는지 감지 → 바뀐 쪽 job만 실행되도록 분기
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # push 이전 커밋과 비교해야 하므로 전체 히스토리 필요

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'DORO-BACK/**'
            frontend:
              - 'DORO-WEB/**'

  # 1. 백엔드(DORO-BACK)가 바뀐 경우에만: 이미지 빌드 후 ECR로 푸시
  deploy-backend:
    name: Build and Push Backend Image to ECR
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    env:
      ECR_REPOSITORY: team2/doroload      # TODO: 실제 ECR 리포지토리 이름/존재 여부 확정 필요

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        working-directory: DORO-BACK      # Dockerfile이 DORO-BACK 하위에 있으므로 빌드 컨텍스트를 여기로 지정
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}     # 커밋 해시값으로 고유 태그 생성
        run: |
          # 고유 해시 태그와 최신본(latest) 태그를 동시에 빌드하여 푸시합니다.
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  # 2. 프런트(DORO-WEB)가 바뀐 경우에만: 빌드 후 S3에 업로드
  deploy-frontend:
    name: Build and Deploy Frontend to S3
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    env:
      S3_BUCKET: doro-load-frontend       # TODO: 실제 S3 버킷 이름/존재 여부 확정 필요

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: DORO-WEB/package-lock.json

      - name: Install dependencies
        working-directory: DORO-WEB
        run: npm ci

      - name: Build
        working-directory: DORO-WEB
        env:
          VITE_API_BASE_URL: /api/v1          # CloudFront가 같은 도메인에서 /api/* 를 백엔드로 라우팅하므로 상대경로 사용
          VITE_USE_MOCK: "false"
          VITE_TMAP_APP_KEY: ${{ secrets.VITE_TMAP_APP_KEY }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync build output to S3
        run: aws s3 sync DORO-WEB/dist "s3://$S3_BUCKET" --delete

      # TODO: CloudFront distribution ID 확정되면 캐시 무효화 스텝 추가
      # - name: Invalidate CloudFront cache
      #   run: aws cloudfront create-invalidation --distribution-id <ID> --paths "/*"
