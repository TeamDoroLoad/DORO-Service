name: Deploy to Amazon ECR

on:
  push:
    branches:
      - main # main 브랜치에 push가 발생하면 작동합니다.

env:
  AWS_REGION: ap-northeast-2              # 서울 리전 코드
  ECR_REPOSITORY: team2/doroload          # 생성하신 실제 ECR 리포지토리 이름

jobs:
  deploy:
    name: Build and Push Image
    runs-on: ubuntu-latest

    steps:
    # 1. GitHub 리포지토리 코드 가져오기
    - name: Checkout
      uses: actions/checkout@v4

    # 2. AWS 자격 증명 설정 (Secrets 변수 사용)
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # 3. Amazon ECR 로그인
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 4. 도커 이미지 빌드, 태그 지정 및 ECR에 푸시
    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }} # 커밋 해시값으로 고유 태그 생성
      run: |
        # 고유 해시 태그와 최신본(latest) 태그를 동시에 빌드하여 푸시합니다.
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest