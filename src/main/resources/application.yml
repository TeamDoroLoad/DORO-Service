spring:
  application:
    name: doro-load-backend
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  sql:
    init:
      mode: never
  jackson:
    time-zone: UTC
    default-property-inclusion: non_null
  data:
    redis:
      # ElastiCache 연결 장애 시 Lettuce 기본 connect timeout(10s)이 그대로 요청 지연으로
      # 전가돼 nearby/detail API가 10초 이상 걸리는 문제가 있었다(2026-07-24). 이 값이 없으면
      # RedisChargerStatusCache의 MySQL 폴백이 정상 동작해도 폴백에 도달하기까지 너무 오래 걸린다.
      connect-timeout: 300ms
      timeout: 500ms

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    redis:
      enabled: true

doro:
  cors:
    allowed-origins: []
  search:
    radius-meters: 3000
    result-limit: 3
    internal-candidate-limit: 200
  freshness:
    fresh-minutes: 10
    delayed-minutes: 30
  tmap:
    base-url: https://apis.openapi.sk.com
    app-key: ${TMAP_APP_KEY:}
    connect-timeout-seconds: 2
    response-timeout-seconds: 3
    search-option: 0
    total-value: 2
    route-cache-ttl-seconds: 240
    route-lock-ttl-millis: 3000
    rate-limit:
      # [부하테스트 임시 변경 2026-07-24] 0으로 두면 RedisRateLimiter.tryAcquire()의 count<=0 조건이
      # 항상 거짓이 되어 RouteResolverService가 TmapRouteClient를 절대 호출하지 않는다 — k6 부하테스트
      # 동안 실제 TMAP 호출(하루 무료 한도 1,000건)을 소진하지 않기 위함. 상세: DORO_Load_부하테스트_TMAP차단_설계.md
      # 테스트 종료 후 반드시 60으로 되돌릴 것.
      route-limit-per-minute: 0
      location-limit-per-minute: 60
  recommendation:
    policy-version: v1
    weights:
      availability-max: 40
      charger-count-max: 20
      membership: 15
      power-max: 10
      freshness-max: 10
      distance-max: 5
  pricing:
    estimated-price-per-kwh: 350
    currency: KRW
    policy-version: estimated-rate-2026-07-v1

resilience4j:
  circuitbreaker:
    instances:
      tmapLocation:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
      tmapRoute:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
  retry:
    instances:
      tmapLocation:
        max-attempts: 2
        wait-duration: 200ms
      tmapRoute:
        max-attempts: 2
        wait-duration: 200ms
  bulkhead:
    instances:
      tmapRoute:
        max-concurrent-calls: 3

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}{UTC} %-5level [%X{requestId}] %logger{36} - %msg%n"
