spring:
  application:
    name: doro-load-backend
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  sql:
    init:
      mode: never
  jackson:
    time-zone: UTC
    default-property-inclusion: non_null
  data:
    redis:
      # ElastiCache м—°кІ° мһҘм•  мӢң Lettuce кё°ліё connect timeout(10s)мқҙ к·ёлҢҖлЎң мҡ”мІӯ м§Җм—°мңјлЎң
      # м „к°ҖлҸј nearby/detail APIк°Җ 10мҙҲ мқҙмғҒ кұёлҰ¬лҠ” л¬ём ңк°Җ мһҲм—ҲлӢӨ(2026-07-24). мқҙ к°’мқҙ м—Ҷмңјл©ҙ
      # RedisChargerStatusCacheмқҳ MySQL нҸҙл°ұмқҙ м •мғҒ лҸҷмһ‘н•ҙлҸ„ нҸҙл°ұм—җ лҸ„лӢ¬н•ҳкё°к№Ңм§Җ л„Ҳл¬ҙ мҳӨлһҳ кұёлҰ°лӢӨ.
      connect-timeout: 300ms
      timeout: 500ms

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    redis:
      enabled: true

doro:
  cors:
    allowed-origins: []
  search:
    radius-meters: 3000
    result-limit: 3
    internal-candidate-limit: 200
  freshness:
    fresh-minutes: 10
    delayed-minutes: 30
  tmap:
    base-url: https://apis.openapi.sk.com
    app-key: ${TMAP_APP_KEY:}
    connect-timeout-seconds: 2
    response-timeout-seconds: 3
    search-option: 0
    total-value: 2
    route-cache-ttl-seconds: 240
    route-lock-ttl-millis: 3000
    rate-limit:
      route-limit-per-minute: 60
      location-limit-per-minute: 60
  recommendation:
    policy-version: v1
    weights:
      availability-max: 40
      charger-count-max: 20
      membership: 15
      power-max: 10
      freshness-max: 10
      distance-max: 5
  pricing:
    estimated-price-per-kwh: 350
    currency: KRW
    policy-version: estimated-rate-2026-07-v1

resilience4j:
  circuitbreaker:
    instances:
      tmapLocation:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
      tmapRoute:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
  retry:
    instances:
      tmapLocation:
        max-attempts: 2
        wait-duration: 200ms
      tmapRoute:
        max-attempts: 2
        wait-duration: 200ms
  bulkhead:
    instances:
      tmapRoute:
        max-concurrent-calls: 3

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}{UTC} %-5level [%X{requestId}] %logger{36} - %msg%n"
